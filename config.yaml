# Configuration for media-transcription VAST DataEngine serverless function
envs:
  # S3 Configuration (VAST S3-compatible storage)
  S3_ENDPOINT: "http://172.200.212.1:80"
  S3_ACCESS_KEY: "CHANGE_ME"
  S3_SECRET_KEY: "CHANGE_ME"

  # ASR Configuration
  # Engine: faster-whisper (default), openai-whisper, nvidia-nims
  ASR_ENGINE: "faster-whisper"
  # Model size: tiny, base, small, medium, large-v3
  # Recommended: "base" for CPU (fast, decent accuracy), "small" for better accuracy
  ASR_MODEL_SIZE: "base"
  # Device: cpu or cuda
  ASR_DEVICE: "cpu"
  # Compute type: int8 (fastest CPU), float16 (GPU), float32 (most compatible)
  ASR_COMPUTE_TYPE: "int8"
  # Language: auto-detect if empty, or ISO 639-1 code (e.g., "en", "es", "fr")
  ASR_LANGUAGE: ""
  # Beam size for decoding (higher = more accurate but slower)
  ASR_BEAM_SIZE: "5"

  # Processing Configuration
  # Maximum media file size in MB
  MAX_FILE_SIZE_MB: "2048"
  # Supported media extensions (comma-separated)
  SUPPORTED_EXTENSIONS: ".mp4,.mkv,.webm,.mov,.avi,.mxf,.ts,.wav,.mp3,.flac,.ogg,.m4a,.aac,.wma"

  # Output Configuration
  # Override output bucket (default: same as source bucket)
  OUTPUT_BUCKET: ""
  # Override output prefix/path (default: same path as source file)
  # Example: "transcriptions/2026" -> s3://OUTPUT_BUCKET/transcriptions/2026/file.transcription.json
  OUTPUT_PREFIX: ""

  # Logging
  LOG_LEVEL: "INFO"
