# Test CloudEvent for Schedule trigger
# Simulates a cron/timer trigger that batch-processes pending media files.
#
# Usage:
#   vast functions invoke -e cloudevent-schedule.yaml -u http://localhost:8080
#
# The function will list objects under SCHEDULE_BUCKET/SCHEDULE_PREFIX
# and transcribe any supported media files found.
# Override bucket/prefix via event data payload if needed.

specversion: "1.0"
type: "vastdata.com:Schedule.TimerElapsed"
source: "vastdata.com:transcribe-cron.16ed120c-a524-4001-9b27-ecb944f99000"
subject: "vastdata.com:kafka-view.schedule-topic"
id: "b2c3d4e5-f6a7-4b5c-9d8e-1f2a3b4c5d6e"
time: "2026-04-06T12:00:00Z"
datacontenttype: "application/json"
data:
  message: "Scheduled transcription batch"
  # Optional: override SCHEDULE_BUCKET/SCHEDULE_PREFIX from config
  # bucket: "media-assets"
  # prefix: "pending/"
# VAST extension attributes (required for Schedule events)
cronschedule: "0 */6 * * *"
timerelapsedtimestamp: "2026-04-06T12:00:00Z"
partitionkey: "transcribe-batch"
